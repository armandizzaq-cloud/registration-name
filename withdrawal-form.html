<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdrawal / Refund — Heicoders Academy</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --header-start: #dc2626;
      --header-end: #b91c1c;
      --accent: #dc2626;
      --label: #555;
      --border: #dde1e7;
      --input-bg: #f8f9fb;
    }

    body {
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .form-container {
      max-width: 580px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: #666;
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, var(--header-start), var(--header-end));
      padding: 1.5rem 1.75rem;
      color: #fff;
    }
    .card-header .brand { font-size: 0.8rem; opacity: 0.85; letter-spacing: 0.5px; text-transform: uppercase; }
    .card-header h4 { margin: 0.3rem 0 0; font-weight: 700; font-size: 1.2rem; }

    .card-body { padding: 1.75rem; }

    .form-label {
      color: var(--label);
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    .form-control, .form-select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      color: #222;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12);
      background: #fff;
    }

    textarea.form-control {
      font-family: 'Courier New', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      min-height: 200px;
    }

    .info-box {
      background: #fef2f2;
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      color: #b91c1c;
      margin-bottom: 1.5rem;
    }

    /* What gets auto-populated preview */
    .parsed-preview {
      background: #f8f9fb;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      display: none;
    }
    .parsed-preview.visible { display: block; }
    .parsed-preview .label { color: #888; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .parsed-preview .value { color: #222; font-weight: 500; }
    .parsed-preview .row-item { margin-bottom: 0.3rem; }

    .btn-submit {
      background: linear-gradient(135deg, var(--header-start), var(--header-end));
      border: none;
      border-radius: 9px;
      padding: 0.8rem;
      font-weight: 600;
      width: 100%;
      color: #fff;
      font-size: 0.95rem;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.92; color: #fff; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    .alert { border-radius: 8px; font-size: 0.88rem; }
  </style>
</head>
<body>
  <div class="form-container">
    <a href="forms-menu.html" class="back-link">&#8592; Back to Forms</a>

    <div class="card">
      <div class="card-header">
        <div class="brand">Heicoders Academy</div>
        <h4>&#x1F504; Withdrawal / Refund Request</h4>
      </div>

      <div class="card-body">
        <div class="info-box">
          Paste the student's registration text from Telegram. Student details will be extracted automatically.
        </div>

        <div id="alertBox" class="alert d-none" role="alert"></div>

        <form id="withdrawalForm" novalidate>

          <!-- Registration Text -->
          <div class="mb-3">
            <label class="form-label">&#x1F4CB; Registration Text <span class="text-danger">*</span></label>
            <textarea class="form-control" id="registrationText" required
              placeholder="Registration&#10;DM100 Wed 08 Apr (PM Online)&#10;&#10;Yu Lin Loh&#10;+65 9380-8806 / yulinloh@gmail.com&#10;&#10;- CASH: $163 (Link)&#10;- SKILLSFUTURE: $500&#10;&#10;As of 05 Apr 2026 08:31 AM"></textarea>

            <!-- Live preview of parsed data -->
            <div class="parsed-preview" id="parsedPreview">
              <div class="row-item">
                <span class="label">Student Name</span>
                <div class="value" id="prevName">—</div>
              </div>
              <div class="row-item">
                <span class="label">Contact</span>
                <div class="value" id="prevMobile">—</div>
              </div>
              <div class="row-item">
                <span class="label">Email</span>
                <div class="value" id="prevEmail">—</div>
              </div>
              <div class="row-item">
                <span class="label">Course</span>
                <div class="value" id="prevCourse">—</div>
              </div>
              <div class="row-item">
                <span class="label">Intake Date</span>
                <div class="value" id="prevDate">—</div>
              </div>
              <div class="row-item">
                <span class="label">Payment Type</span>
                <div class="value" id="prevPayment">—</div>
              </div>
            </div>
          </div>

          <!-- Request Type -->
          <div class="mb-3">
            <label class="form-label">&#x1F6A8; Request Type <span class="text-danger">*</span></label>
            <select class="form-select" id="requestType" required>
              <option value="" disabled selected>-- Select Type --</option>
              <option value="Withdrawal">Withdrawal</option>
              <option value="Refund">Refund</option>
            </select>
          </div>

          <!-- Notes -->
          <div class="mb-4">
            <label class="form-label">&#x1F4DD; Notes</label>
            <textarea class="form-control" id="notes" rows="3"
              placeholder="Enter any additional notes or details..."></textarea>
          </div>

          <button type="submit" class="btn btn-submit" id="submitBtn">
            <span id="btnText">Submit Request</span>
            <span id="btnSpinner" class="d-none">
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Submitting...
            </span>
          </button>

        </form>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE (same URL as registration form)
    const WEBHOOK_URL = 'https://script.google.com/a/macros/heicodersacademy.com/s/AKfycbw7tTWHQsaYwqkussKG78_IYyljk9vNHFNGUvhv1MOJrUfhs_0dIi2zLxfS590Bp0p5sg/exec';

    // --------------------------------------------------------
    // Live preview parser (client-side, mirrors Code.gs logic)
    // --------------------------------------------------------
    function parseText(text) {
      const result = { course: '', startDate: '', studentName: '', email: '', mobile: '', paymentInfo: '' };
      if (!text.trim()) return result;

      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      let idx = 0;

      if (lines[idx] && /^registration$/i.test(lines[idx])) idx++;

      if (idx < lines.length && /^[A-Z]{1,6}\d{2,4}/i.test(lines[idx])) {
        result.course = lines[idx];
        const dm = lines[idx].match(/(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)/i)
                || lines[idx].match(/\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{4}/i);
        if (dm) result.startDate = dm[0];
        idx++;
      }

      while (idx < lines.length) {
        const line = lines[idx];
        const isContact  = /[@+\d]/.test(line.slice(0,5)) || line.includes('@');
        const isPayment  = /^-\s*(CASH|SKILLSFUTURE|CORP|NTUC|CREDIT|PAYNOW|\$)/i.test(line);
        const isTs       = /^as of/i.test(line);
        if (!isContact && !isPayment && !isTs) { result.studentName = line; idx++; break; }
        idx++;
      }

      while (idx < lines.length) {
        const line = lines[idx];
        if (line.includes('@') || /\+65/.test(line)) {
          const em = line.match(/[\w.+'-]+@[\w.-]+\.[a-zA-Z]{2,}/);
          if (em) result.email = em[0].toLowerCase();
          const mm = line.match(/\+65[\s-]?\d{4}[\s-]?\d{4}/);
          if (mm) result.mobile = mm[0].replace(/[\s-]/g,'');
          idx++; break;
        }
        idx++;
      }

      const pl = [];
      while (idx < lines.length) {
        const line = lines[idx];
        if (/^-/.test(line) && !/^as of/i.test(line)) pl.push(line.replace(/^-\s*/,'').trim());
        idx++;
      }
      result.paymentInfo = pl.join(' | ');

      return result;
    }

    // Show live preview as user types
    document.getElementById('registrationText').addEventListener('input', function () {
      const parsed = parseText(this.value);
      const preview = document.getElementById('parsedPreview');
      const hasData = parsed.studentName || parsed.course;

      if (hasData) {
        document.getElementById('prevName').textContent    = parsed.studentName  || '—';
        document.getElementById('prevMobile').textContent  = parsed.mobile       || '—';
        document.getElementById('prevEmail').textContent   = parsed.email        || '—';
        document.getElementById('prevCourse').textContent  = parsed.course       || '—';
        document.getElementById('prevDate').textContent    = parsed.startDate    || '—';
        document.getElementById('prevPayment').textContent = parsed.paymentInfo  || '—';
        preview.classList.add('visible');
      } else {
        preview.classList.remove('visible');
      }
    });

    // --------------------------------------------------------
    // Form submission
    // --------------------------------------------------------
    document.getElementById('withdrawalForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const form       = this;
      const submitBtn  = document.getElementById('submitBtn');
      const btnText    = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');
      const alertBox   = document.getElementById('alertBox');

      if (!form.checkValidity()) { form.reportValidity(); return; }

      submitBtn.disabled = true;
      btnText.classList.add('d-none');
      btnSpinner.classList.remove('d-none');
      alertBox.classList.add('d-none');

      const payload = {
        formType:         'withdrawal',
        registrationText: document.getElementById('registrationText').value.trim(),
        requestType:      document.getElementById('requestType').value,
        notes:            document.getElementById('notes').value.trim()
      };

      try {
        const response = await fetch(WEBHOOK_URL, {
          method:   'POST',
          redirect: 'follow',
          headers:  { 'Content-Type': 'text/plain' }, // text/plain avoids CORS preflight with Apps Script
          body:     JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
          showAlert('success', result.message || '✅ Request submitted successfully!');
          form.reset();
          document.getElementById('parsedPreview').classList.remove('visible');
        } else {
          showAlert('danger', '❌ ' + (result.error || 'Submission failed. Please try again.'));
        }

      } catch (err) {
        showAlert('danger', '❌ Network error. Please check your connection and try again.');
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        btnText.classList.remove('d-none');
        btnSpinner.classList.add('d-none');
      }
    });

    function showAlert(type, message) {
      const alertBox = document.getElementById('alertBox');
      alertBox.className = 'alert alert-' + type;
      alertBox.textContent = message;
      alertBox.classList.remove('d-none');
      alertBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>
